<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Sorting Visualizer</h1>
        <div class="controls-wrapper">
            <!-- Data Generation & Settings Group -->
            <div class="control-group">
                <h3>Array Settings</h3>
                <div class="group-row">
                    <input type="text" id="custom-array-input" placeholder="e.g. -10, 50, 20, 100" title="Enter comma-separated numbers between -100 and 100">
                    <button id="apply-custom-btn" class="btn primary">Apply Custom</button>
                    <button id="generate-btn" class="btn primary">Random Array</button>
                </div>
                <div class="group-row settings">
                    <div class="slider-container">
                        <label for="size-input">Size</label>
                        <input type="number" id="size-input" min="5" max="150" value="50">
                    </div>
                    <div class="slider-container">
                        <label for="speed-slider">Speed</label>
                        <input type="range" id="speed-slider" min="1" max="100" value="50">
                    </div>
                </div>
            </div>

            <!-- Algorithms Group -->
            <div class="control-group">
                <h3>Sorting Algorithms</h3>
                <div class="group-row algorithms">
                    <button id="bubble-btn" class="btn sort-btn">Bubble Sort</button>
                    <button id="selection-btn" class="btn sort-btn">Selection Sort</button>
                    <button id="insertion-btn" class="btn sort-btn">Insertion Sort</button>
                    <button id="counting-btn" class="btn sort-btn">Counting Sort</button>
                    <button id="merge-btn" class="btn sort-btn">Merge Sort</button>
                    <button id="quick-btn" class="btn sort-btn">Quick Sort</button>
                    <button id="heap-btn" class="btn sort-btn">Heap Sort</button>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="legend">
            <div class="legend-item">
                <div class="color-box" style="background-color: var(--bar-default);"></div>
                <span>Unsorted</span>
            </div>
            <div class="legend-item">
                <div class="color-box" style="background-color: var(--bar-compare);"></div>
                <span>Comparing</span>
            </div>
            <div class="legend-item">
                <div class="color-box" style="background-color: var(--bar-swap);"></div>
                <span>Swapping</span>
            </div>
            <div class="legend-item">
                <div class="color-box" style="background-color: var(--bar-sorted);"></div>
                <span>Sorted</span>
            </div>
        </div>
        <div id="array-container"></div>
    </main>

    <!-- Custom Modals -->
    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div id="modal-icon" class="modal-icon"></div>
            <h2 id="modal-title">Notification</h2>
            <p id="modal-message">Message goes here.</p>
            <button id="modal-close-btn" class="btn primary">OK</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
