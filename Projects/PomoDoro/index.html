<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Pomodoro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

    <div class="app">
        <h1>Pomodoro Timer</h1>

        <div class="mode" id="mode">Focus </div>

        <div class="timer" id="timer">25:00</div>

        <div class="controls">
            <button id="start">Start</button>
            <button id="pause">Pause</button>
            <button id="reset">Reset</button>
        </div>

        <div class="sessions">
            Sessions: <span id="count">0</span>
        </div>

        <button class="theme-toggle" id="theme">Switch Theme</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
